server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bookmyseat
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false

# JWT Configuration
jwt:
  secret: mySuperSecretKeyForJwtAuthenticationThatIsLongEnough123456123456789
  expiration: 86400000

# Logging (optional but good)
logging:
  level:
    org.springframework: INFO
    com.bookmyseat: DEBUG